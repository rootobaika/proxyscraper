name: Build & Release

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        arch: [amd64]
        include:
          - os: ubuntu-latest
            goos: linux
            ext: ""
          - os: windows-latest
            goos: windows
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Build
        run: go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o proxy_scraper${{ matrix.ext }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxy_scraper_${{ matrix.goos }}_${{ matrix.arch }}
          path: proxy_scraper${{ matrix.ext }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: proxy_scraper_*
          merge-multiple: true

      - name: Rename artifacts
        run: |
          mv proxy_scraper proxy_scraper_linux_amd64 2>/dev/null || true
          mv proxy_scraper.exe proxy_scraper_windows_amd64.exe 2>/dev/null || true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            proxy_scraper_linux_amd64
            proxy_scraper_windows_amd64.exe
          generate_release_notes: true
